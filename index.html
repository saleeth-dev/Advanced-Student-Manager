<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Student Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1> Smart Student Manager</h1>

  <div class="form">
    <input type="text" id="name" placeholder="Student Name">
    <input type="number" id="marks" placeholder="Marks">
    <button id="addBtn">Add Student</button>
  </div>

  <input type="text" id="search" placeholder="Search student...">

  <h2>Average Marks: <span id="average">0</span></h2>

  <ul id="studentList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
